<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - AhnajakCode</title>
    <link rel="stylesheet" href="admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Header -->
    <header class="admin-header">
        <div class="header-left">
            <h1><i class="fas fa-code"></i> AhnajakCode Admin</h1>
        </div>
        <a href="../index.html" class="view-site-btn">
            <i class="fas fa-eye"></i> View User Site
        </a>
    </header>

    <div class="container">
        <!-- Add Product Form -->
        <section class="card">
            <h2><i class="fas fa-plus-circle"></i> Add New Product</h2>
            <form id="addProductForm" class="product-form">
                <div class="form-group">
                    <label>Product Title *</label>
                    <input type="text" id="p-title" required placeholder="e.g. E-commerce Script">
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Category *</label>
                        <select id="p-category" required>
                            <option value="script">Script</option>
                            <option value="plugin">Plugin</option>
                            <option value="template">Template</option>
                            <option value="ui">UI Kit</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Price (USD) *</label>
                        <input type="number" id="p-price" required min="0" step="0.01" placeholder="49.00">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Vendor *</label>
                    <input type="text" id="p-vendor" required placeholder="e.g. DevMaster">
                </div>
                
                <div class="form-group">
                    <label>Description *</label>
                    <textarea id="p-desc" required rows="3" placeholder="Product description..."></textarea>
                </div>
                
                <div class="form-group">
                    <label>Icon (FontAwesome class)</label>
                    <input type="text" id="p-icon" placeholder="fa-code" value="fa-code">
                    <small>Examples: fa-shopping-cart, fa-plug, fa-briefcase, fa-mobile-alt</small>
                </div>
                
                <button type="submit" class="btn-primary btn-full">
                    <i class="fas fa-save"></i> Save Product
                </button>
            </form>
        </section>

        <!-- Products List -->
        <section class="card">
            <div class="section-header">
                <h2><i class="fas fa-box"></i> All Products (<span id="productCount">0</span>)</h2>
            </div>
            
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 Search products..." oninput="searchProducts()">
            </div>
            
            <div class="table-responsive">
                <table class="products-table">
                    <thead>
                        <tr>
                            <th>Icon</th>
                            <th>Title</th>
                            <th>Category</th>
                            <th>Price</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="productsTableBody">
                        <!-- JS will render here -->
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <!-- Edit Modal -->
    <div class="modal" id="editModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-edit"></i> Edit Product</h3>
                <button class="close-btn" onclick="closeEditModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <form id="editProductForm">
                <input type="hidden" id="edit-id">
                
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" id="edit-title" required>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Category</label>
                        <select id="edit-category" required>
                            <option value="script">Script</option>
                            <option value="plugin">Plugin</option>
                            <option value="template">Template</option>
                            <option value="ui">UI Kit</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Price</label>
                        <input type="number" id="edit-price" required min="0" step="0.01">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Vendor</label>
                    <input type="text" id="edit-vendor" required>
                </div>
                
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="edit-desc" required rows="3"></textarea>
                </div>
                
                <div class="form-group">
                    <label>Icon</label>
                    <input type="text" id="edit-icon" required>
                </div>
                
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" onclick="closeEditModal()">Cancel</button>
                    <button type="submit" class="btn-primary">Update</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <script src="admin.js"></script>
</body>
                                </html>
